<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kinect-knob</title>
<style>
  :root {
    --bg: #0e1116; --card: #161b23; --edge: #232b37; --text: #dbe2ea;
    --dim: #7d8a99; --green: #2fd97f; --amber: #ffb454; --red: #ff6b6b; --blue: #59a7ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 system-ui, "Segoe UI", sans-serif; padding: 24px; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 20px; letter-spacing: .3px; margin-bottom: 4px; }
  h1 span { color: var(--green); }
  .sub { color: var(--dim); margin-bottom: 20px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: 340px 1fr; gap: 16px; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--edge); border-radius: 12px; padding: 16px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--dim); margin-bottom: 12px; }
  .dial-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .chip { padding: 3px 10px; border-radius: 999px; font-size: 12px; border: 1px solid var(--edge); color: var(--dim); }
  .chip.on { color: var(--green); border-color: var(--green); }
  .chip.warn { color: var(--amber); border-color: var(--amber); }
  .chip.err { color: var(--red); border-color: var(--red); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  td { padding: 4px 0; }
  td:first-child { color: var(--dim); width: 46%; }
  .btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  button { background: #1d2530; color: var(--text); border: 1px solid var(--edge); border-radius: 8px;
           padding: 8px 14px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--blue); }
  #log { font: 12px/1.7 ui-monospace, Consolas, monospace; color: var(--dim); max-height: 190px; overflow-y: auto; }
  #stream { width: 100%; border-radius: 8px; display: none; margin-top: 10px; }
  .statebar { font-size: 26px; font-weight: 600; }
  .state-idle { color: var(--dim); } .state-engaging { color: var(--amber); } .state-engaged { color: var(--green); }
</style>
</head>
<body>
<div class="wrap">
  <h1>kinect<span>-knob</span></h1>
  <div class="sub">turn an invisible knob &middot; pinch to grip &middot; twist for volume &middot; open-palm swipe to skip</div>

  <div class="chips" id="chips"></div>

  <div class="grid">
    <div class="card dial-box">
      <h2>Volume</h2>
      <svg id="dial" viewBox="0 0 200 200" width="220" height="220">
        <circle cx="100" cy="100" r="84" fill="none" stroke="#232b37" stroke-width="14"
                stroke-dasharray="396 528" stroke-dashoffset="-66" transform="rotate(90 100 100)"/>
        <circle id="arc" cx="100" cy="100" r="84" fill="none" stroke="#2fd97f" stroke-width="14"
                stroke-linecap="round" stroke-dasharray="0 528" stroke-dashoffset="-66" transform="rotate(90 100 100)"/>
        <text id="volText" x="100" y="96" text-anchor="middle" font-size="34" font-weight="700" fill="#dbe2ea">--</text>
        <text id="angText" x="100" y="126" text-anchor="middle" font-size="14" fill="#7d8a99"></text>
      </svg>
      <div class="statebar" id="stateText">idle</div>
      <div class="btns">
        <button onclick="act('volume_down')">Vol −</button>
        <button onclick="act('volume_up')">Vol +</button>
        <button onclick="act('prev')">⏮ Prev</button>
        <button onclick="act('play_pause')">⏯</button>
        <button onclick="act('next')">Next ⏭</button>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom:16px">
        <h2>Live tracking</h2>
        <table id="stats"></table>
        <div class="btns"><button id="streamBtn" onclick="toggleStream()">Show camera debug view</button></div>
        <img id="stream" alt="debug stream">
      </div>
      <div class="card">
        <h2>Events</h2>
        <div id="log"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let streaming = false;

function chip(text, cls) { return `<span class="chip ${cls||''}">${text}</span>`; }

function toggleStream() {
  streaming = !streaming;
  $('stream').style.display = streaming ? 'block' : 'none';
  $('stream').src = streaming ? '/debug/stream?' + Date.now() : '';
  $('streamBtn').textContent = streaming ? 'Hide camera debug view' : 'Show camera debug view';
}

async function act(action) {
  await fetch('/api/action', { method: 'POST', headers: {'Content-Type': 'application/json'},
                               body: JSON.stringify({action}) });
}

function fmt(v, suffix='') { return (v === null || v === undefined) ? '—' : v + suffix; }

async function tick() {
  try {
    const s = await (await fetch('/api/state')).json();
    const e = s.engine, c = s.controller;

    const chips = [
      chip('camera: ' + s.backend, s.fps > 5 ? 'on' : 'err'),
      chip(s.fps + ' fps'),
      chip(s.proc_ms + ' ms/frame'),
      chip(s.has_depth ? 'depth: on' : 'depth: none', s.has_depth ? 'on' : 'warn'),
      ...(s.ir_active ? [chip('IR night mode', 'on')] : []),
      c.mode === 'dry-run'
        ? chip('dry-run (no Home Assistant)', 'warn')
        : chip(c.ha_connected ? 'home assistant: connected' : 'home assistant: ' + (c.ha_error || 'connecting…'),
               c.ha_connected ? 'on' : 'err'),
    ];
    $('chips').innerHTML = chips.join('');

    const vol = c.volume;
    $('volText').textContent = vol === null || vol === undefined ? '--' : Math.round(vol * 100);
    $('arc').setAttribute('stroke-dasharray', `${(vol||0) * 396} 528`);
    $('arc').setAttribute('stroke', e.state === 'engaged' ? '#2fd97f' : '#59a7ff');
    $('angText').textContent = e.state === 'engaged' ? (e.angle_deg > 0 ? '+' : '') + e.angle_deg + '°' : '';
    $('stateText').textContent = e.state;
    $('stateText').className = 'statebar state-' + e.state;

    $('stats').innerHTML = `
      <tr><td>hand</td><td>${e.hand_present ? (e.handedness || 'yes') : 'none'}</td></tr>
      <tr><td>pose</td><td>${fmt(e.openness)}</td></tr>
      <tr><td>pinch ratio</td><td>${fmt(e.pinch_ratio)} <span style="color:var(--dim)">(grip &lt; 0.42, release &gt; 0.65)</span></td></tr>
      <tr><td>palm speed</td><td>${fmt(e.palm_speed, ' w/s')}</td></tr>
      <tr><td>hand distance</td><td>${e.hand_depth_m ? e.hand_depth_m.toFixed(2) + ' m' : '—'}</td></tr>
      <tr><td>gated out</td><td>${fmt(e.gated_out || null)}</td></tr>
      <tr><td>volume entity</td><td>${fmt(c.volume_entity || null)}</td></tr>
      <tr><td>media entity</td><td>${fmt(c.media_entity || null)}</td></tr>
      <tr><td>media state</td><td>${fmt(c.media_state)}</td></tr>`;

    $('log').innerHTML = (c.events || []).map(x => `<div>${x}</div>`).join('') || '<div>—</div>';
  } catch (err) { /* server restarting; keep polling */ }
}
setInterval(tick, 200);
tick();
</script>
</body>
</html>
